<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; padding:12px; }
.card { background:white; padding:12px; margin-bottom:12px; border-radius:8px; }
select, input, button { width:100%; padding:12px; font-size:16px; margin-top:8px; }
button { background:#1976D2; color:white; border:none; border-radius:6px; }
button:active { background:#125ea8; }

/* Legend */
.legend { display:flex; gap:20px; margin:15px 0; }
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-box { width:20px; height:20px; border-radius:4px; border:1px solid #333; }
.leave { background:#4CAF50; }
.out { background:#FF9800; }

/* Gantt */
#ganttWrapper { overflow-x:auto; background:white; border-radius:8px; }
.gantt { display:grid; min-width:max-content; }
.cell { border:1px solid #eee; height:28px; }
.name { background:#f0f0f0; font-weight:bold; position:sticky; left:0; z-index:2; }
.header { background:#eaeaea; font-weight:bold; position:sticky; top:0; z-index:3; }
</style>
</head>

<body>

<h2>Submit Leave</h2>

<div class="card">
    <select id="emp"></select>
    <input type="date" id="start">
    <input type="date" id="end">

    <select id="out">
        <option value="No">Normal Leave</option>
        <option value="Yes">Out‑Station</option>
    </select>

    <button onclick="submitLeave()">Submit Leave</button>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-box leave"></div> Normal</div>
    <div class="legend-item"><div class="legend-box out"></div> Out‑Station</div>
</div>



<h3>Leave Chart</h3>

<div class="card">
    <button onclick="nav(-1)">◀</button>
    <strong id="label"></strong>
    <button onclick="nav(1)">▶</button>
</div>

<div id="ganttWrapper">
    <div id="chart"></div>
</div>


<h3>Manage Leaves</h3>
<table id="leaveTable" border="1" style="width:100%; margin-bottom:20px;">
  <thead>
    <tr>
      <th>Employee</th>
      <th>Start</th>
      <th>End</th>
      <th>Out Station</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
    <!-- ✔ EXPORT CSV BUTTON (correct placement, works 100%) -->
<div class="card">
    /export_csv
        Download Leave Data (CSV)
    </button>
</div>
<script>
let dt = new Date(), y = dt.getFullYear(), m = dt.getMonth()+1;

fetch("/employees").then(r=>r.json()).then(d=>{
    emp.innerHTML = d.map(e => `<option value="${e[0]}">${e[1]}</option>`).join("");
});

function submitLeave() {
    fetch("/add_leave",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            employee_id: emp.value,
            start: start.value,
            end: end.value,
            out: out.value
        })
    }).then(()=>{ 
        loadLeavesTable();
        loadGantt();
        alert("Leave submitted!");
    });
}

function loadLeavesTable() {
    fetch("/list_leaves")
    .then(r=>r.json())
    .then(rows=>{
        let html="";
        rows.forEach(r=>{
            html += `
            <tr>
              <td>${r.name}</td>
              <td>${r.start}</td>
              <td>${r.end}</td>
              <td>${r.out}</td>
              <td>
                <button onclick="deleteLeave(${r.id})"
                  style="background:red;color:white;border:none;padding:5px;border-radius:4px;">
                  Delete
                </button>
              </td>
            </tr>`;
        });
        document.querySelector("#leaveTable tbody").innerHTML = html;
    });
}

function deleteLeave(id){
    if(!confirm("Are you sure?")) return;

    fetch(`/delete_leave/${id}`,{method:"DELETE"})
    .then(()=> {
        loadLeavesTable();
        loadGantt();
    });
}

function nav(d){
    m+=d;
    if(m<1){m=12; y--; }
    if(m>12){m=1; y++; }
    loadGantt();
}

function loadGantt(){
    fetch(`/gantt?year=${y}&month=${m}`).then(r=>r.json()).then(r=>{
        label.innerText = new Date(y, m-1).toLocaleString('default',{month:'long',year:'numeric'});
        chart.innerHTML="";
        
        let g = document.createElement("div");
        g.className = "gantt";
        g.style.gridTemplateColumns = `150px repeat(${r.days}, 30px)`;

        g.innerHTML += `<div class="cell name header">Name</div>`;
        for(let i=1; i<=r.days; i++)
            g.innerHTML += `<div class="cell header">${i}</div>`;

        for(let name in r.data){
            g.innerHTML += `<div class="cell name">${name}</div>`;
            for(let d=1; d<=r.days; d++){
                let date = `${r.year}-${String(r.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let found = r.data[name].find(x => date >= x.start && date <= x.end);
                g.innerHTML += `<div class="cell ${found ? (found.out==='Yes'?'out':'leave') : ''}"></div>`;
            }
        }

        chart.appendChild(g);
    });
}

loadLeavesTable();
loadGantt();
</script>

</body>
</html>
