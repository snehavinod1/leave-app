<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 12px;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
}

select, input[type="date"], button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 8px;
}

button {
    background: #1976D2;
    color: white;
    border: none;
    border-radius: 6px;
}

.legend {
    display: flex;
    gap: 20px;
    margin: 10px 0;
    align-items: center;
}

.legend-box {
    width: 16px;
    height: 16px;
    border-radius: 4px;
}

.leave { background:#4CAF50 }
.out { background:#FF9800 }

#ganttWrapper {
    overflow-x: auto;
    background: white;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.gantt {
    display: grid;
    min-width: max-content;
}

.cell {
    border: 1px solid #eee;
    height: 32px;
}

.name {
    background: #f0f0f0;
    font-weight: bold;
    position: sticky;
    left: 0;
    z-index: 2;
}

.header {
    background: #eaeaea;
    font-weight: bold;
}

@media (min-width: 768px) {
    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
}
</style>
</head>

<body>

<h2>Leave Tracking Submission</h2>

<div class="card">
    <select id="emp"></select>

    <select id="out">
        <option value="No">Normal Leave</option>
        <option value="Yes">Out‑Station</option>
    </select>

    <div class="row">
        <input type="date" id="start">
        <input type="date" id="end">
    </div>

    <button onclick="save()">Submit Leave</button>
</div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-box leave"></div> Normal Leave
    </div>
    <div class="legend-item">
        <div class="legend-box out"></div> Out‑Station
    </div>
</div>

<!-- 🌟 EXPORT CSV BUTTON -->

<div class="card">
    <button onclick="export_csv()">
        Download Leave Data (CSV)
    </button>
</div>

<!-- 🌟 MANAGE LEAVES TABLE -->
<h3>Manage Leaves</h3>
<table id="leaveTable" border="1" style="width:100%; margin-bottom:20px;">
  <thead>
    <tr>
      <th>Employee</th>
      <th>Start</th>
      <th>End</th>
      <th>Out Station</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h3>Leave Gantt Chart</h3>

<div class="card">
    <button onclick="nav(-1)">◀ Previous</button>
    <strong id="label"></strong>
    <button onclick="nav(1)">Next ▶</button>
</div>

<div id="ganttWrapper">
    <div id="chart"></div>
</div>

<script>
let today=new Date(), y=today.getFullYear(), m=today.getMonth()+1;

// Load employees
fetch("/employees").then(r=>r.json()).then(d=>{
  emp.innerHTML = d.map(e =>
    `<option value="${e[0]}">${e[1]}</option>`
  ).join("");
});

// Submit leave
function save(){
 fetch("/add_leave",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
        employee_id:emp.value,
        start:start.value,
        end:end.value,
        out:out.value
    })
 }).then(()=>{
    loadLeavesTable();
    load();
 });
}

// Navigate months
function nav(d){
 m+=d;
 if(m<1){m=12; y--;}
 if(m>12){m=1; y++;}
 load();
}

// Load manage leaves table
function loadLeavesTable(){
 fetch("/list_leaves")
 .then(r=>r.json())
 .then(rows=>{
    let html="";
    rows.forEach(r=>{
        html += `
        <tr>
          <td>${r.name}</td>
          <td>${r.start}</td>
          <td>${r.end}</td>
          <td>${r.out}</td>
          <td>
            <button style="background:red" onclick="deleteLeave(${r.id})">Delete</button>
          </td>
        </tr>
        `;
    });
    document.querySelector("#leaveTable tbody").innerHTML = html;
 });
}

// Delete leave
function deleteLeave(id){
 if(!confirm("Delete this leave?")) return;
 fetch(`/delete_leave/${id}`,{method:"DELETE"})
 .then(()=>{
    loadLeavesTable();
    load();
 });
}

// Load Gantt chart
function load(){
 fetch(`/gantt?year=${y}&month=${m}`)
 .then(r=>r.json())
 .then(r=>{
    label.innerText = new Date(y,m-1).toLocaleString('default',{month:'long',year:'numeric'});
    chart.innerHTML = "";

    let g = document.createElement("div");
    g.className="gantt";
    g.style.gridTemplateColumns = `120px repeat(${r.days},32px)`;

    g.innerHTML += `<div class="cell name header">Name</div>`;
    for(let i=1;i<=r.days;i++){
        g.innerHTML += `<div class="cell header">${i}</div>`;
    }

    for(let name in r.data){
        g.innerHTML += `<div class="cell name">${name}</div>`;
        for(let d=1;d<=r.days;d++){
            let date = `${r.year}-${String(r.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let l = r.data[name].find(x => date>=x.start && date<=x.end);
            g.innerHTML += `<div class="cell ${l ? (l.out==='Yes'?'out':'leave') : ''}"></div>`;
        }
    }

    chart.appendChild(g);
 });
}

loadLeavesTable();
load();
</script>

</body>
</html>
